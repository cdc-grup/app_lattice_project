name: Deploy Backend to Production

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - 'docker-compose.prod.yml'
      - 'package.json'
      - 'turbo.json'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Self-Hosted Runner
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pre-build Cleanup
        run: |
          echo "🧹 Cleaning up disk space before build..."
          docker system prune -af --volumes || true
          docker builder prune -af || true

      - name: Create .env file
        run: |
          echo "DATABASE_URL=$(echo '${{ secrets.DATABASE_URL }}' | xargs)" > .env
          echo "JWT_SECRET=$(echo '${{ secrets.JWT_SECRET }}' | xargs)" >> .env
          echo "REDIS_URL=redis://redis:6379" >> .env
          cp .env packages/db/.env

      - name: Build and Deploy Containers
        run: |
          npm install --legacy-peer-deps
          npx turbo test --filter="./apps/server/*" --filter="./packages/*"
          npm run db:migrate
          docker compose -f docker-compose.prod.yml down --remove-orphans
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Cleanup Unused Docker Resources
        run: docker system prune -f
