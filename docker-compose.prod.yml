services:
  nginx:
    container_name: lattice-nginx
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: always
    depends_on:
      - gateway
    networks:
      - default
      - red_proyectos

  gateway:
    container_name: lattice-gateway
    build:
      context: .
      dockerfile: apps/server/gateway/Dockerfile
      target: production
    # Removed ports: "3000:3000" because it will be accessed via nginx
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_PATH=/lattice
      - AUTH_SERVICE_URL=http://auth:3001
      - GEO_SERVICE_URL=http://geo:3002
      - SOCIAL_SERVICE_URL=http://social:3003
    depends_on:
      - auth
      - geo
      - social
    networks:
      - default
      - red_proyectos

  auth:
    build:
      context: .
      dockerfile: apps/server/auth/Dockerfile
      target: production
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}

  geo:
    build:
      context: .
      dockerfile: apps/server/geo/Dockerfile
      target: production
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=${DATABASE_URL}

  social:
    build:
      context: .
      dockerfile: apps/server/social/Dockerfile
      target: production
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=${DATABASE_URL}

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

networks:
  red_proyectos:
    external: true
