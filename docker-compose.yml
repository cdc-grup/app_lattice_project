services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=circuit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d circuit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: apps/server/gateway/Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth:3001
      - GEO_SERVICE_URL=http://geo:3002
      - SOCIAL_SERVICE_URL=http://social:3003
    depends_on:
      - auth
      - geo
      - social

  auth:
    build:
      context: .
      dockerfile: apps/server/auth/Dockerfile
      target: development
    ports:
      - "3001:3001"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:password@db:5432/circuit_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy

  geo:
    build:
      context: .
      dockerfile: apps/server/geo/Dockerfile
      target: development
    ports:
      - "3002:3002"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:password@db:5432/circuit_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy

  social:
    build:
      context: .
      dockerfile: apps/server/social/Dockerfile
      target: development
    ports:
      - "3003:3003"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:password@db:5432/circuit_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
